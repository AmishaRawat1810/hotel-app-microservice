version: '3.9'

services:

  booking-service:
    build: .
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/bookingdb
    deploy:
      replicas: 3

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - booking-service
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  mongodb:
    image: mongo:latest
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: