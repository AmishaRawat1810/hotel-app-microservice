events {
    worker_connections 1024;
}

http {
    upstream user_service {
        server user-service:8080;
    }

    upstream search_service {
            server search-service:3000;
    }

    server {
        listen 80;

        # --- USER SERVICE PATHS ---
        location /api/users/ {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

       # --- SEARCH SERVICE PATHS ---
       location /api/search/ {
           # 1. Block public access to internal sync endpoints
           location /api/search/internal {
               return 403 "Access Denied: Internal Endpoint Only\n";
           }

           # 2. Forward all other public search requests safely
           proxy_pass http://search_service;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       }
    }
}